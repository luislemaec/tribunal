# =============================================================================
# Bundle de mensajes — Sistema Tribunal Electoral (SITEC)
# =============================================================================
# Encoding: ISO-8859-1 con escapes Unicode \uXXXX (formato estándar Java
# .properties). Para caracteres acentuados/especiales se usa \uNNNN.
# Ejemplos: ñ=ñ   á=á   é=é   í=í   ó=ó   ú=ú
#           Ñ=Ñ   Á=Á   ¿=¿   ¡=¡   —=—
#
# Convenciones de claves:
#   <ámbito>.<categoría>.<concreto>
# Ámbitos:    app, common, btn, msg, label, validator, placeholder
# Por form:   form.<nombre>.<categoría>.<concreto>
#
# Uso en XHTML:   #{msg['btn.save']}     |   <h:outputText value="#{msg['label.user']}"/>
# Uso en Java :   JsfUtil.getProperty("msg.user.required", true);
#
# Mantener este archivo ORDENADO por sección y ALFABÉTICO dentro de cada
# sección para facilitar el merge en Git y la localización futura.
# =============================================================================


