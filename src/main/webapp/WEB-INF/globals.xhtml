<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="http://primefaces.org/ui">

    <!-- Growl global con presentaciÃ³n profesional.
         id="msgs" + autoUpdate="true" hace que cualquier
         JsfUtil.addInfoMessage(...) / addSuccessMessage(...) etc. aparezca
         automÃ¡ticamente sin necesitar update="msgs" en cada commandButton.
         widgetVar="msgs" permite invocarlo desde JS vÃ­a Tribunal.toast.*
         (ver tribunal-globals.js â†’ showToast â†’ renderMessage). -->
    <p:growl id="msgs" widgetVar="msgs" globalOnly="true"
             showDetail="true" showSummary="true" sticky="false"
             life="5000" autoUpdate="true"/>

    <!-- Tooltip global: cualquier elemento con title="..." obtiene tooltip
         consistente con el tema, sin necesidad de declararlo pÃ¡gina por pÃ¡gina.
         Excluye el editor PrimeFaces (que usa title internamente). -->
    <p:tooltip globalSelector="[title]:not(.p-editor *)" trackMouse="true"
               showEffect="fade" hideEffect="fade"/>

    <!-- ScrollTop: botÃ³n flotante "ir arriba" cuando se hace scroll.
         Aplica a toda pÃ¡gina con contenido largo (datatables, escrutinios). -->
    <p:scrollTop target="window" threshold="400" icon="pi pi-arrow-up"
                 styleClass="custom-scroll-top"/>

    <!-- Indicador de ambiente: chip flotante discreto en la esquina inferior
         izquierda (solo fuera de PRODUCCIÃ“N). Reemplaza al notificationBar
         full-width que ocupaba demasiado espacio sin aportar valor. -->
    <h:panelGroup layout="block"
                  rendered="#{loginBean.loggedIn and loginBean.servidor ne 'P R O D U C C I Ã“ N'}"
                  styleClass="ambiente-chip">
        <i class="pi pi-server" style="margin-right:.4rem"/>
        <b>#{loginBean.servidor}</b>
    </h:panelGroup>

    <h:form id="frmGlobal">
        <!-- ConfirmDialog global: cualquier botÃ³n con
             <p:confirm header="..." message="..."/> usa este. -->
        <p:confirmDialog global="true" widgetVar="cfm" showEffect="fade" hideEffect="fade"
                         responsive="true" width="420">
            <p:commandButton value="SÃ­" type="button" styleClass="ui-confirmdialog-yes"
                             icon="pi pi-check"/>
            <p:commandButton value="No" type="button" styleClass="ui-confirmdialog-no ui-button-secondary"
                             icon="pi pi-times"/>
        </p:confirmDialog>

        <!-- IdleMonitor: avisa a los 50 min, expira la sesiÃ³n a los 60 min (web.xml). -->
        <p:idleMonitor timeout="3000000">
            <p:ajax event="idle" oncomplete="PF('dlgIdle').show()"/>
        </p:idleMonitor>
        <p:dialog widgetVar="dlgIdle" header="SesiÃ³n por expirar" modal="true"
                  closable="false" resizable="false" width="380">
            <p style="margin:0 0 1rem">Su sesiÃ³n expirarÃ¡ por inactividad en pocos minutos.</p>
            <p:commandButton value="Continuar" icon="pi pi-refresh" ajax="true"
                             onclick="PF('dlgIdle').hide()" process="@this"/>
        </p:dialog>
    </h:form>

</ui:composition>
