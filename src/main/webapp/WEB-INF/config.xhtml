<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:f="jakarta.faces.core"
                xmlns:h="jakarta.faces.html"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="http://primefaces.org/ui">

    <a tabindex="0" id="layout-config-button" class="layout-config-button">
        <i class="pi pi-cog"/>
    </a>

    <div class="layout-config">
        <h5>#{msg['config.menu.type']}</h5>
        <h:form id="config-form">
            <p:selectOneRadio value="#{guestPreferences.menuMode}" layout="pageDirection"
                              onchange="PrimeFaces.EcuadorConfigurator.changeMenuMode(event.target.value)">
                <f:selectItem itemLabel="#{msg['config.menu.type.static']}"     itemValue="layout-menu-static"/>
                <f:selectItem itemLabel="#{msg['config.menu.type.overlay']}"    itemValue="layout-menu-overlay"/>
                <f:selectItem itemLabel="#{msg['config.menu.type.slim']}"       itemValue="layout-menu-slim"/>
                <f:selectItem itemLabel="#{msg['config.menu.type.horizontal']}" itemValue="layout-menu-horizontal"/>
                <p:ajax update="config-form"/>
            </p:selectOneRadio>

            <hr/>

            <h5>#{msg['config.menu.color']}</h5>
            <p:selectOneRadio value="#{guestPreferences.menuColor}" layout="pageDirection"
                              onchange="PrimeFaces.EcuadorConfigurator.changeMenuColor(event.target.value)">
                <f:selectItem itemLabel="#{msg['config.menu.color.light']}" itemValue="light"/>
                <f:selectItem itemLabel="#{msg['config.menu.color.dark']}"  itemValue="dark"/>
                <p:ajax update="config-form"/>
            </p:selectOneRadio>

            <hr/>

            <h5>#{msg['config.input.style']}</h5>
            <p:selectOneRadio value="#{guestPreferences.inputStyle}" layout="pageDirection"
                              onchange="PrimeFaces.EcuadorConfigurator.updateInputStyle(event.target.value)">
                <f:selectItem itemLabel="#{msg['config.input.style.outlined']}" itemValue="outlined"/>
                <f:selectItem itemLabel="#{msg['config.input.style.filled']}"   itemValue="filled"/>
                <p:ajax/>
            </p:selectOneRadio>

            <hr/>

            <h5>#{msg['config.rtl']}</h5>
            <p:toggleSwitch id="rtl-switch" value="#{guestPreferences.orientationRTL}"
                            onchange="PrimeFaces.EcuadorConfigurator.changeMenuToRTL()">
                <p:ajax onstart="PrimeFaces.EcuadorConfigurator.beforeResourceChange()" update="config-form"/>
            </p:toggleSwitch>

            <hr/>

            <h5>#{msg['config.themes']}</h5>
            <div class="layout-themes">
                <ui:repeat value="#{guestPreferences.menuThemes}" var="theme">
                    <div>
                        <p:commandLink actionListener="#{guestPreferences.setTheme(theme.file)}"
                                       style="background-image: linear-gradient(to right, #{theme.color1}, #{theme.color2})"
                                       title="#{theme.name}" process="@this" update="config-form"
                                       onstart="PrimeFaces.EcuadorConfigurator.beforeResourceChange()"
                                       oncomplete="PrimeFaces.EcuadorConfigurator.changeScheme('#{theme.file}')">
                            <ui:fragment rendered="#{theme.file eq guestPreferences.theme}">
                                <i class="pi pi-check" style="color: #ffffff"/>
                            </ui:fragment>
                        </p:commandLink>
                    </div>
                </ui:repeat>
            </div>
        </h:form>
    </div>
</ui:composition>
