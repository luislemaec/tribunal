<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/WEB-INF/template.xhtml">

    <ui:define name="title">#{msg['form.perfil.title']}</ui:define>

    <ui:define name="viewname">
        <li>#{msg['form.usuarios.crumb.security']}</li>
        <li>/</li>
        <li>
            <p:link outcome="/perfil">#{msg['form.perfil.title']}</p:link>
        </li>
    </ui:define>

    <ui:define name="content">

        <!-- ENCABEZADO -->
        <div class="grid mb-2">
            <div class="col-12">
                <div class="flex align-items-center gap-3">
                    <div class="flex justify-content-center align-items-center border-round-lg"
                         style="width:3.5rem;height:3.5rem;background:linear-gradient(135deg,#6366f1,#8b5cf6);flex-shrink:0">
                        <i class="pi pi-user text-white" style="font-size:1.5rem"></i>
                    </div>
                    <div>
                        <h2 class="m-0 text-900 font-bold text-2xl">#{msg['form.perfil.title']}</h2>
                        <p class="text-500 mt-1 mb-0 text-sm">Información y configuración de su cuenta de usuario</p>
                    </div>
                </div>
            </div>
        </div>

        <h:form id="frmPerfil">
            <div class="surface-card shadow-1 border-round-lg p-4">
                <p:messages id="msgs" showDetail="true" closable="true" styleClass="mb-3"/>
                <div class="flex justify-content-center align-items-center" style="min-height:10rem">
                    <span class="text-500 text-lg">
                        <i class="pi pi-info-circle mr-2"></i>
                        Módulo de perfil en construcción.
                    </span>
                </div>
            </div>
        </h:form>

    </ui:define>
</ui:composition>
