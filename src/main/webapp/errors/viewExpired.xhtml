<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:h="jakarta.faces.html"
                xmlns:p="http://primefaces.org/ui"
                template="/errors/error-template.xhtml">
    <ui:define name="content">
        <div class="top">
            <p:graphicImage name="images/curvy-left.svg" library="ecuador-layout" class="left"/>
            <p:graphicImage name="images/logout.svg" library="ecuador-layout" class="main"/>
            <p:graphicImage name="images/curvy-right.svg" library="ecuador-layout" class="right"/>
            <span>#{msg['btn.logout']}</span>
            <div class="seperator"></div>
        </div>
        <div class="bottom">
            <span class="exception-panel-header">#{msg['error.viewExpired.title']}</span>
            <span class="exception-panel-subheader">#{msg['error.viewExpired.message']}</span>
            <h:link outcome="/login" styleClass="ui-button-raised ui-button-info">
                <i class="pi pi pi-home"> #{msg['error.btn.home']}</i>
            </h:link>
        </div><!-- comment --> 
    </ui:define>
</ui:composition>
