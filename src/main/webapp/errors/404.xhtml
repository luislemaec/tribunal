<ui:composition xmlns="http://www.w3.org/1999/xhtml" xmlns:ui="jakarta.faces.facelets" xmlns:h="jakarta.faces.html" xmlns:p="http://primefaces.org/ui" template="/errors/error-template.xhtml">
    <ui:define name="content">

        <div class="top">
            <p:graphicImage name="images/curvy-left.svg" library="ecuador-layout" class="left"/>
            <p:graphicImage name="images/404.svg" library="ecuador-layout" class="main"/>
            <p:graphicImage name="images/curvy-right.svg" library="ecuador-layout" class="right"/>
            <span>404</span>
            <div class="seperator"></div>
        </div>
        <div class="bottom">
            <span class="exception-panel-header">#{msg['error.404.title']}</span>
            <span class="exception-panel-subheader">#{msg['error.404.message']}</span>
           <p:linkButton outcome="/dashboard.jsf" value="#{msg['error.btn.home']}" icon="pi pi-home" styleClass="ui-button-raised ui-button-info" />
        </div><!-- comment -->

    </ui:define>
</ui:composition>
