<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/WEB-INF/template.xhtml"
                xmlns:c="jakarta.tags.core">

    <ui:define name="title">#{msg['form.mjrv.title']}</ui:define>

    <ui:define name="viewname">
        <li>#{msg['form.iglesias.crumb.admin']}</li>
        <li>/</li>
        <li>
            <p:link outcome="/mjrv">#{msg['form.mjrv.title']}</p:link>
        </li>
    </ui:define>

    <ui:define name="content">

        <!-- ENCABEZADO -->
        <div class="grid mb-2">
            <div class="col-12">
                <div class="flex align-items-center gap-3">
                    <div class="flex justify-content-center align-items-center border-round-lg"
                         style="width:3.5rem;height:3.5rem;background:linear-gradient(135deg,#0ea5e9,#6366f1);flex-shrink:0">
                        <i class="pi pi-id-card text-white" style="font-size:1.5rem"></i>
                    </div>
                    <div>
                        <h2 class="m-0 text-900 font-bold text-2xl">Administración de MJRV</h2>
                        <p class="text-500 mt-1 mb-0 text-sm">Miembros de la Junta Receptora del Voto</p>
                    </div>
                </div>
            </div>
        </div>

        <h:form id="frmMJRV">

            <div class="surface-card shadow-1 border-round-lg p-3">

                <p:messages id="msgs" showDetail="true" closable="true" styleClass="mb-3"/>

                <!-- TOOLBAR -->
                <div class="flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
                    <div class="flex align-items-center gap-2 flex-wrap">
                        <p:commandButton value="Nuevo" icon="pi pi-plus"
                                         styleClass="ui-button-success"
                                         actionListener="#{jrvController.nuevo}"
                                         update="outPnlMesas" oncomplete="PF('dlgMesa').show()">
                            <p:resetInput target="outPnlMesas"/>
                        </p:commandButton>
                        <p:commandButton id="btnEliminaRegistros"
                                         value="#{jrvController.mensajeBotonEliminar}"
                                         icon="pi pi-trash"
                                         styleClass="ui-button-danger"
                                         actionListener="#{jrvController.eliminarSeleccionados}"
                                         disabled="#{!jrvController.existeSeleccionados()}"
                                         update="@this tblMJRV msgs">
                            <p:confirm header="Confirmar eliminación"
                                       message="¿Está seguro que desea eliminar los registros seleccionados?"
                                       icon="pi pi-exclamation-triangle"/>
                        </p:commandButton>
                    </div>
                    <p:commandButton value="Exportar PDF" icon="pi pi-upload"
                                     styleClass="ui-button-outlined ui-button-help" ajax="false"
                                     disabled="#{empty jrvController.listaMJRV}">
                        <p:dataExporter type="pdf" target="tblMJRV" fileName="MJRV"/>
                    </p:commandButton>
                </div>

                <!-- DATATABLE (placeholder — sin columnas definidas aún) -->
                <p:dataTable id="tblMJRV" widgetVar="wdTblMJRV" var="jrv"
                             value="#{jrvController.listaMJRV}" reflow="true"
                             paginator="true" rows="10" rowSelectMode="add"
                             rowsPerPageTemplate="10,25,50"
                             paginatorPosition="bottom"
                             paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                             currentPageReportTemplate="Mostrando {startRecord}-{endRecord} de {totalRecords} registros"
                             emptyMessage="No hay registros MJRV. Use el botón 'Nuevo' para crear uno."
                             showGridlines="true"
                             styleClass="ui-datatable-striped ui-datatable-sm">

                    <!-- Las columnas se definirán cuando esté disponible la estructura de datos -->

                </p:dataTable>

                <!-- Confirm dialog global -->
                <p:confirmDialog global="true" showEffect="fade" hideEffect="fade"
                                 responsive="true" width="400" style="max-width:96vw">
                    <p:commandButton value="Sí, eliminar" icon="pi pi-check"
                                     styleClass="ui-button-danger" type="button"
                                     onclick="PF('dlgConfirm').accept()"/>
                    <p:commandButton value="Cancelar" icon="pi pi-times"
                                     styleClass="ui-button-secondary ml-2" type="button"
                                     onclick="PF('dlgConfirm').reject()"/>
                </p:confirmDialog>

            </div><!-- /surface-card -->

            <!-- ======================================================
                 DIALOGO: NUEVO / EDITAR MJRV
                 Usa c:forEach para campos dinámicos definidos en el controlador
                 ====================================================== -->
            <p:dialog header="Detalles MJRV"
                      showEffect="fade" hideEffect="fade"
                      modal="true" widgetVar="dlgMesa"
                      responsive="true" width="520"
                      style="max-width:96vw"
                      contentStyle="overflow-y:auto;max-height:75vh"
                      closeOnEscape="true">

                <p:outputPanel id="outPnlMesas" class="ui-fluid">
                    <p:outputPanel>
                        <div class="formgrid grid">
                            <c:forEach items="#{jrvController.columnas}" var="col">
                                <div class="field col-12">
                                    <label for="id_#{col.property}" class="font-medium text-700 text-sm">#{col.header}</label>
                                    <c:if test="#{col.type.name.contains('CatalogoGeneral')}">
                                        <p:selectOneMenu id="id_#{col.property}"
                                                         value="#{jrvController.cargo.id}"
                                                         filter="true" filterMatchMode="startsWith"
                                                         styleClass="w-full">
                                            <f:selectItem itemLabel="— Seleccione —" itemValue=""/>
                                            <f:selectItems value="#{catalogoBean.autoridadesMesa}" var="autoridadMesa"
                                                           itemLabel="#{autoridadMesa.nombre}" itemValue="#{autoridadMesa.id}"/>
                                        </p:selectOneMenu>
                                    </c:if>
                                    <c:if test="#{col.type.name.contains('IglesiaPersona')}">
                                        <p:inputText id="id_#{col.property}" styleClass="mask-cedula w-full"
                                                     value="#{jrvController.iglesiaPersona.persona.documento}"
                                                     maxlength="10" required="true"
                                                     onkeyup="this.value = this.value.toUpperCase()"/>
                                    </c:if>
                                    <c:if test="#{col.type.name.contains('Mesa')}">
                                        <p:selectOneMenu id="id_#{col.property}"
                                                         value="#{jrvController.cargo.id}"
                                                         filter="true" filterMatchMode="startsWith"
                                                         styleClass="w-full">
                                            <f:selectItem itemLabel="— Seleccione —" itemValue=""/>
                                            <f:selectItems value="#{jrvController.cargos}" var="cargoI"
                                                           itemLabel="#{cargoI.nombre}" itemValue="#{cargoI.id}"/>
                                        </p:selectOneMenu>
                                    </c:if>
                                    <c:if test="#{col.type.name.contains('Periodo')}">
                                        <p:selectOneMenu id="id_#{col.property}"
                                                         value="#{jrvController.periodo.id}"
                                                         filter="true" filterMatchMode="startsWith"
                                                         styleClass="w-full">
                                            <f:selectItems value="#{jrvController.periodos}" var="periodo"
                                                           itemLabel="#{periodo.nombre}" itemValue="#{periodo.id}"/>
                                        </p:selectOneMenu>
                                    </c:if>
                                </div>
                            </c:forEach>
                        </div>
                    </p:outputPanel>
                </p:outputPanel>

                <f:facet name="footer">
                    <div class="flex justify-content-end flex-wrap gap-2 w-full">
                        <p:commandButton value="Cancelar" icon="pi pi-times"
                                         onclick="PF('dlgMesa').hide()"
                                         styleClass="ui-button-outlined ui-button-secondary"
                                         type="button"/>
                        <p:commandButton value="#{msg['btn.save']}" icon="pi pi-check"
                                         styleClass="ui-button-success"
                                         actionListener="#{jrvController.guardarMesaSeleccionado}"
                                         update="outPnlMesas tblMJRV msgs"
                                         process="outPnlMesas @this"
                                         oncomplete="if (!args.validationFailed) PF('dlgMesa').hide()"/>
                    </div>
                </f:facet>

            </p:dialog>

        </h:form>

    </ui:define>
</ui:composition>
