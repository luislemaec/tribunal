<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/WEB-INF/template.xhtml">

    <ui:define name="title">Menú</ui:define>

    <ui:define name="viewname">
        <li>Admin</li>
        <li>/</li>
        <li>
            <p:link outcome="/menu">Menú</p:link>
        </li>
    </ui:define>

    <ui:define name="content">

        <!-- ENCABEZADO -->
        <div class="grid mb-2">
            <div class="col-12">
                <div class="flex align-items-center gap-3">
                    <div class="flex justify-content-center align-items-center border-round-lg"
                         style="width:3.5rem;height:3.5rem;background:linear-gradient(135deg,#06b6d4,#0891b2);flex-shrink:0">
                        <i class="pi pi-bars text-white" style="font-size:1.5rem"></i>
                    </div>
                    <div>
                        <h2 class="m-0 text-900 font-bold text-2xl">Administración de Menú</h2>
                        <p class="text-500 mt-1 mb-0 text-sm">Gestión de la estructura de menús del sistema</p>
                    </div>
                </div>
            </div>
        </div>

        <h:form id="frmMenu">

            <div class="surface-card shadow-1 border-round-lg p-3">

                <p:messages id="msgs" showDetail="true" closable="true" styleClass="mb-3"/>

                <!-- TOOLBAR -->
                <div class="flex flex-wrap align-items-center justify-content-end gap-2 mb-3">
                    <p:commandButton value="Nuevo" icon="pi pi-plus"
                                     styleClass="ui-button-success"
                                     actionListener="#{menuController.nuevoMenu}"
                                     update="frmMenu:outPnlMenu"
                                     oncomplete="PF('dlgMenuo').show()">
                        <p:resetInput target="frmMenu:outPnlMenu"/>
                    </p:commandButton>
                </div>

                <!-- TREE TABLE con inline edit -->
                <p:treeTable value="#{menuController.root}" var="menu"
                             showGridlines="true" editable="true" id="trTblMenuo"
                             styleClass="ui-datatable-striped ui-datatable-sm">
                    <p:ajax event="rowEdit"       listener="#{menuController.onRowEdit}"   update="msgs"/>
                    <p:ajax event="rowEditCancel" listener="#{menuController.onRowCancel}" update="msgs"/>

                    <p:column headerText="ID" sortBy="#{menu.id}" style="width:6%" responsivePriority="1">
                        <p:cellEditor>
                            <f:facet name="output"><span class="text-sm text-500">#{menu.id}</span></f:facet>
                            <f:facet name="input"><p:inputText value="#{menu.id}" style="width:100%" disabled="true"/></f:facet>
                        </p:cellEditor>
                    </p:column>

                    <p:column headerText="Nombre" sortBy="#{menu.nombre}" styleClass="w-auto" responsivePriority="1">
                        <p:cellEditor>
                            <f:facet name="output"><span class="text-sm font-medium text-900">#{menu.nombre}</span></f:facet>
                            <f:facet name="input"><p:inputText value="#{menu.nombre}" style="width:100%" onkeyup="this.value = this.value.toUpperCase()"/></f:facet>
                        </p:cellEditor>
                    </p:column>

                    <p:column headerText="Acción" sortBy="#{menu.accion}" styleClass="w-auto" responsivePriority="2">
                        <p:cellEditor>
                            <f:facet name="output"><span class="text-sm text-600">#{menu.accion}</span></f:facet>
                            <f:facet name="input"><p:inputText value="#{menu.accion}" style="width:100%"/></f:facet>
                        </p:cellEditor>
                    </p:column>

                    <p:column headerText="URL" styleClass="w-auto" responsivePriority="3">
                        <p:cellEditor>
                            <f:facet name="output"><span class="text-sm text-500 font-mono">#{menu.url}</span></f:facet>
                            <f:facet name="input"><p:inputText value="#{menu.url}" style="width:100%"/></f:facet>
                        </p:cellEditor>
                    </p:column>

                    <p:column headerText="Icono" styleClass="w-auto" responsivePriority="4">
                        <p:cellEditor>
                            <f:facet name="output">
                                <div class="flex align-items-center gap-2">
                                    <i class="#{menu.icono}"/>
                                    <span class="text-sm text-500">#{menu.icono}</span>
                                </div>
                            </f:facet>
                            <f:facet name="input"><p:inputText value="#{menu.icono}" style="width:100%"/></f:facet>
                        </p:cellEditor>
                    </p:column>

                    <p:column headerText="Orden" style="width:5%" responsivePriority="3">
                        <p:cellEditor>
                            <f:facet name="output"><p:badge value="#{menu.orden}" severity="info"/></f:facet>
                            <f:facet name="input"><p:inputText value="#{menu.orden}" style="width:100%"/></f:facet>
                        </p:cellEditor>
                    </p:column>

                    <p:column headerText="Nodo final" styleClass="w-auto" responsivePriority="4">
                        <p:cellEditor>
                            <f:facet name="output"><span class="text-sm text-500">#{menu.nodoFinal}</span></f:facet>
                            <f:facet name="input"><p:inputText value="#{menu.nodoFinal}" style="width:100%"/></f:facet>
                        </p:cellEditor>
                    </p:column>

                    <p:column headerText="ComponenteId" styleClass="w-auto" responsivePriority="5">
                        <p:cellEditor>
                            <f:facet name="output"><span class="text-sm text-500 font-mono">#{menu.componenteid}</span></f:facet>
                            <f:facet name="input"><p:inputText value="#{menu.componenteid}" style="width:100%"/></f:facet>
                        </p:cellEditor>
                    </p:column>

                    <p:column style="width:7%" responsivePriority="5" styleClass="text-center">
                        <p:rowEditor/>
                        <p:commandButton icon="pi pi-trash"
                                         styleClass="ui-button-rounded ui-button-text ui-button-danger"
                                         title="Eliminar menú"
                                         process="@this"
                                         oncomplete="PF('dlgEliminaRegistro').show()">
                            <f:setPropertyActionListener value="#{menu}" target="#{menuController.menuSeleccionado}"/>
                        </p:commandButton>
                    </p:column>
                </p:treeTable>

                <!-- Confirm dialog para eliminar (con action específica) -->
                <p:confirmDialog widgetVar="dlgEliminaRegistro"
                                 showEffect="fade" hideEffect="fade"
                                 responsive="true" width="400" style="max-width:96vw"
                                 message="¿Está seguro que desea eliminar este menú?"
                                 header="Confirmar eliminación" severity="warn">
                    <p:commandButton value="Sí, eliminar" icon="pi pi-check"
                                     styleClass="ui-button-danger"
                                     actionListener="#{menuController.eliminarMenuSeleccionado}"
                                     process="@this"
                                     update="trTblMenuo msgs"
                                     oncomplete="PF('dlgEliminaRegistro').hide()"/>
                    <p:commandButton value="Cancelar" icon="pi pi-times"
                                     styleClass="ui-button-secondary ml-2" type="button"
                                     onclick="PF('dlgEliminaRegistro').hide()"/>
                </p:confirmDialog>

            </div><!-- /surface-card -->

            <!-- ======================================================
                 DIALOGO: NUEVO MENU
                 ====================================================== -->
            <p:dialog header="Detalles del menú"
                      showEffect="fade" hideEffect="fade"
                      modal="true" widgetVar="dlgMenuo"
                      responsive="true" width="480"
                      style="max-width:96vw"
                      contentStyle="overflow-y:auto;max-height:75vh"
                      closeOnEscape="true">

                <p:outputPanel id="outPnlMenu" class="ui-fluid">
                    <p:outputPanel rendered="#{menuController.menuSeleccionado ne null}">

                        <div class="formgrid grid">

                            <div class="field col-12">
                                <label for="nombre" class="font-medium text-700 text-sm">
                                    Nombre <span class="text-red-500">*</span>
                                </label>
                                <p:inputText id="nombre" styleClass="w-full"
                                             value="#{menuController.menuSeleccionado.nombre}"
                                             maxlength="100" required="true"
                                             onkeyup="this.value = this.value.toUpperCase()"/>
                            </div>

                            <div class="field col-12 md:col-6">
                                <label for="orden" class="font-medium text-700 text-sm">
                                    Orden <span class="text-red-500">*</span>
                                </label>
                                <p:inputText id="orden" styleClass="w-full"
                                             value="#{menuController.menuSeleccionado.orden}"
                                             required="true"/>
                            </div>

                            <div class="field col-12 md:col-6">
                                <label for="padre" class="font-medium text-700 text-sm">
                                    Menú padre <span class="text-red-500">*</span>
                                </label>
                                <p:inputText id="padre" styleClass="w-full"
                                             value="#{menuController.menuSeleccionado.padre.id}"
                                             required="true"/>
                            </div>

                            <div class="field col-12">
                                <label for="descripcion" class="font-medium text-700 text-sm">
                                    Descripción <span class="text-red-500">*</span>
                                </label>
                                <p:inputText id="descripcion" styleClass="w-full"
                                             value="#{menuController.menuSeleccionado.descripcion}"
                                             maxlength="150" required="true"
                                             onkeyup="this.value = this.value.toUpperCase()"/>
                            </div>

                        </div>

                    </p:outputPanel>
                </p:outputPanel>

                <f:facet name="footer">
                    <div class="flex justify-content-end flex-wrap gap-2 w-full">
                        <p:commandButton value="Cancelar" icon="pi pi-times"
                                         onclick="PF('dlgMenuo').hide()"
                                         styleClass="ui-button-outlined ui-button-secondary"
                                         type="button"/>
                        <p:commandButton value="#{msg['btn.save']}" icon="pi pi-check"
                                         styleClass="ui-button-success"
                                         actionListener="#{menuController.guardarMenu}"
                                         update="outPnlMenu trTblMenuo msgs"
                                         process="outPnlMenu @this"
                                         oncomplete="if (!args.validationFailed) PF('dlgMenuo').hide()"/>
                    </div>
                </f:facet>

            </p:dialog>

        </h:form>

    </ui:define>
</ui:composition>
