<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/WEB-INF/template.xhtml">
    <ui:define name="title">#{msg['form.usuarios.title']}</ui:define>
    <ui:define name="viewname">
        <li>#{msg['form.usuarios.crumb.security']}</li>
        <li>/</li>
        <li>
            <p:link outcome="/usuarios">#{msg['form.usuarios.title']}</p:link>
        </li>
    </ui:define>
    <ui:define name="content">
        <h:form id="frmUsuarios">
            <div class="grid">
                <div class="col-12">
                    <div class="card">
                        <p:dataTable id="tblUsuarios" widgetVar="wdTablaUsuarios" var="rolUs"
                                     value="#{usuarioControlador.listaRolUsuarios}" reflow="true"
                                     paginator="true" rows="10" rowSelectMode="add"
                                     paginatorPosition="bottom" showGridlines="true"
                                     styleClass="ui-datatable-striped ui-datatable-sm ui-datatable-gridlines mt-2">

                            <p:column headerText="#{msg['form.usuarios.table.header.email']}"
                                      sortBy="#{rolUs.usuario.correo}" filterBy="#{rolUs.usuario.correo}"
                                      styleClass="sm:w-max md:w-2 lg:w-3rem">
                                <h:outputText value="#{rolUs.usuario.correo}"/>
                            </p:column>
                            <p:column headerText="#{msg['form.usuarios.table.header.username']}"
                                      sortBy="#{rolUs.usuario.username}" filterBy="#{rolUs.usuario.username}"
                                      styleClass="sm:w-max md:w-2 lg:w-3rem">
                                <h:outputText value="#{rolUs.usuario.username}"/>
                            </p:column>
                            <p:column headerText="#{msg['form.usuarios.table.header.nombres']}"
                                      sortBy="#{rolUs.usuario.personaNombres}" filterBy="#{rolUs.usuario.personaNombres}"
                                      styleClass="sm:w-max md:w-2 lg:w-6rem">
                                <h:outputText value="#{rolUs.usuario.personaNombres} #{rolUs.usuario.personaApellidos}"/>
                            </p:column>
                            <p:column headerText="#{msg['form.usuarios.table.header.rol']}"
                                      sortBy="#{rolUs.rol.nombre}" filterBy="#{rolUs.rol.nombre}"
                                      styleClass="sm:w-max md:w-2 lg:w-3rem">
                                <p:tag value="#{rolUs.rol.nombre}" severity="info"/>
                            </p:column>
                            <p:column headerText="#{msg['form.usuarios.table.header.iglesia']}"
                                      sortBy="#{rolUs.usuario.iglesiaNombre}" filterBy="#{rolUs.usuario.iglesiaNombre}"
                                      styleClass="sm:w-max md:w-2 lg:w-6rem">
                                <p:chip rendered="#{not empty rolUs.usuario.iglesiaNombre}"
                                        label="#{rolUs.usuario.iglesiaNombre}" icon="pi pi-home"/>
                                <h:outputText rendered="#{empty rolUs.usuario.iglesiaNombre}"
                                              value="—" styleClass="text-400"/>
                            </p:column>

                            <p:column exportable="false" styleClass="sm:w-max md:w-2 lg:w-3rem">
                                <f:facet name="header">
                                    <p:commandButton value="#{msg['form.usuarios.btn.new']}" icon="pi pi-plus"
                                                     actionListener="#{usuarioControlador.crearNuevoUsuario}"
                                                     update=":frmUsuarios:outPnlUsuario"
                                                     oncomplete="PF('dlgUsuario').show()"
                                                     styleClass="ui-button-success fadeinleft animation-duration-500 animation-iteration-1 shadow-1">
                                        <p:resetInput target=":frmUsuarios:outPnlUsuario"/>
                                    </p:commandButton>
                                </f:facet>
                                <p:commandButton icon="pi pi-pencil" update="frmUsuarios:outPnlUsuario"
                                                 oncomplete="PF('dlgUsuario').show()"
                                                 title="#{msg['form.usuarios.btn.edit.title']}"
                                                 styleClass="edit-button rounded-button ui-button-info"
                                                 process="@this"
                                                 action="#{usuarioControlador.cargarParaEdicion(rolUs)}">
                                    <p:resetInput target="frmUsuarios:outPnlUsuario"/>
                                </p:commandButton>
                                <p:commandButton class="ui-button-danger rounded-button ml-1" icon="pi pi-trash"
                                                 actionListener="#{usuarioControlador.eliminarUsuario}"
                                                 process="@this" update="tblUsuarios">
                                    <f:setPropertyActionListener value="#{rolUs.usuario}"
                                                                 target="#{usuarioControlador.usuarioSeleccionado}"/>
                                    <p:confirm header="#{msg['form.usuarios.confirm.delete.header']}"
                                               message="#{msg['form.usuarios.confirm.delete.message']}"
                                               icon="pi pi-exclamation-triangle"/>
                                </p:commandButton>
                            </p:column>

                        </p:dataTable>

                        <p:dialog header="#{msg['form.usuarios.dialog.title']}" showEffect="fade" modal="true"
                                  widgetVar="dlgUsuario" responsive="true">
                            <p:outputPanel id="outPnlUsuario" class="ui-fluid">
                                <p:outputPanel rendered="#{not empty usuarioControlador.usuarioSeleccionado}">

                                    <div class="p-field">
                                        <p:outputLabel for="cedula" value="#{msg['form.usuarios.label.cedula']}"/>
                                        <p:inputText id="cedula" styleClass="mask-cedula"
                                                     value="#{usuarioControlador.usuarioSeleccionado.personaDocumento}"
                                                     required="true"
                                                     disabled="#{(usuarioControlador.personaRegistroCivil ne null) or (not empty usuarioControlador.usuarioSeleccionado.personaDocumento)}">
                                            <p:keyFilter for="cedula" mask="num"/>
                                            <p:ajax event="change"
                                                    update="cedula nombres rolUs correo iglesiaPanel msgs"
                                                    listener="#{usuarioControlador.blurEvent}" process="@this"/>
                                            <f:validateLength minimum="10"/>
                                        </p:inputText>
                                    </div>

                                    <div class="p-field">
                                        <p:outputLabel for="nombres" value="#{msg['form.usuarios.label.nombres']}"/>
                                        <p:inputText id="nombres"
                                                     value="#{usuarioControlador.usuarioSeleccionado.personaNombres}"
                                                     disabled="#{not empty usuarioControlador.usuarioSeleccionado.personaNombres}"/>
                                    </div>

                                    <div class="p-field">
                                        <p:outputLabel for="rolUs" value="#{msg['form.usuarios.label.username']}"/>
                                        <p:inputText id="rolUs"
                                                     value="#{usuarioControlador.usuarioSeleccionado.username}"
                                                     required="true"
                                                     disabled="#{usuarioControlador.personaRegistroCivil eq null}"/>
                                    </div>

                                    <div class="p-field">
                                        <p:outputLabel for="correo" value="#{msg['form.usuarios.label.email']}"/>
                                        <p:inputText id="correo"
                                                     value="#{usuarioControlador.usuarioSeleccionado.correo}"/>
                                    </div>

                                    <div class="p-field">
                                        <p:outputLabel for="perfil" value="#{msg['form.usuarios.label.perfil']}"/>
                                        <p:selectOneMenu id="perfil"
                                                         value="#{usuarioControlador.rolSeleccionado.id}"
                                                         required="true">
                                            <f:selectItem itemLabel="#{msg['form.usuarios.placeholder.rol']}" itemValue=""/>
                                            <f:selectItems value="#{usuarioControlador.listaRoles}" var="rol"
                                                           itemLabel="#{rol.nombre}" itemValue="#{rol.id}"/>
                                            <p:ajax event="change"
                                                    listener="#{usuarioControlador.cargarRolSeleccionado}"
                                                    process="@this" update="iglesiaPanel"/>
                                        </p:selectOneMenu>
                                    </div>

                                    <p:outputPanel id="iglesiaPanel">
                                        <div class="p-field" rendered="#{usuarioControlador.rolRequiereIglesia}">
                                            <p:outputLabel for="iglesia">
                                                #{msg['form.usuarios.label.iglesia']}
                                                <span class="text-red-500">*</span>
                                            </p:outputLabel>
                                            <p:selectOneMenu id="iglesia"
                                                             value="#{usuarioControlador.usuarioSeleccionado.iglesiaId}"
                                                             filter="true" filterMatchMode="contains"
                                                             required="#{usuarioControlador.rolRequiereIglesia}"
                                                             requiredMessage="#{msg['form.usuarios.label.iglesia.required']}">
                                                <f:selectItem itemLabel="#{msg['form.usuarios.placeholder.iglesia']}" itemValue=""/>
                                                <f:selectItems value="#{usuarioControlador.listaIglesias}" var="igl"
                                                               itemLabel="#{igl.nombre} - #{igl.comunidad}"
                                                               itemValue="#{igl.id}"/>
                                            </p:selectOneMenu>
                                            <small class="text-500">#{msg['form.usuarios.label.iglesia.hint']}</small>
                                        </div>
                                    </p:outputPanel>
                                </p:outputPanel>
                            </p:outputPanel>
                            <f:facet name="footer">
                                <p:commandButton value="#{msg['btn.save']}" icon="pi pi-check"
                                                 actionListener="#{usuarioControlador.actualizarUsuario()}"
                                                 update="outPnlUsuario tblUsuarios msgs"
                                                 process="outPnlUsuario @this msgs"
                                                 oncomplete="PF('dlgUsuario').hide()" ajax="false"/>
                                <p:commandButton value="#{msg['btn.cancel']}" icon="pi pi-times"
                                                 onclick="PF('dlgUsuario').hide()"
                                                 class="ui-button-secondary"/>
                            </f:facet>
                        </p:dialog>
                    </div>
                </div>
            </div>
        </h:form>
    </ui:define>
</ui:composition>
