<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:pe="http://primefaces.org/ui/extensions"
                template="/WEB-INF/template.xhtml"
                xmlns:c="jakarta.tags.core">

    <ui:define name="title">#{msg['form.plantillaCorreos.title']}</ui:define>

    <ui:define name="viewname">
        <li>#{msg['form.usuarios.crumb.security']}</li>
        <li>/</li>
        <li><p:link outcome="/plantillaCorreos">#{msg['form.plantillaCorreos.title']}</p:link></li>
    </ui:define>

    <ui:define name="content">

        <!-- ENCABEZADO -->
        <div class="grid mb-2">
            <div class="col-12">
                <div class="flex align-items-center gap-3">
                    <div class="flex justify-content-center align-items-center border-round-lg"
                         style="width:3.5rem;height:3.5rem;background:linear-gradient(135deg,#f97316,#ea580c);flex-shrink:0">
                        <i class="pi pi-envelope text-white" style="font-size:1.5rem"></i>
                    </div>
                    <div>
                        <h2 class="m-0 text-900 font-bold text-2xl">#{msg['form.plantillaCorreos.title']}</h2>
                        <p class="text-500 mt-1 mb-0 text-sm">Edición de plantillas de correo electrónico del sistema</p>
                    </div>
                </div>
            </div>
        </div>

        <h:form id="frmPlantillaCorreo">

            <p:messages id="msgs" showDetail="true" closable="true" styleClass="mb-3"/>

            <!-- SELECTOR DE PLANTILLA -->
            <div class="surface-card shadow-1 border-round-lg p-3 mb-3">
                <div class="flex align-items-center gap-2 mb-3">
                    <i class="pi pi-filter text-500"></i>
                    <span class="font-semibold text-700">Seleccione la plantilla de correo a editar</span>
                </div>
                <div class="formgrid grid">
                    <div class="field col-12 md:col-8">
                        <label for="plantilla" class="font-medium text-700 text-sm">Plantilla de correo</label>
                        <p:selectOneMenu id="plantilla"
                                         value="#{plantillaCorreoController.plantillaCorreoSeleccionado.id}"
                                         filter="true" filterMatchMode="startsWith" styleClass="w-full">
                            <f:selectItem itemLabel="— Seleccione una plantilla —" itemValue=""/>
                            <f:selectItems value="#{plantillaCorreoController.plantillasCorreos}" var="plantilla"
                                           itemLabel="#{plantilla.asunto}" itemValue="#{plantilla.id}"/>
                            <p:ajax event="change"
                                    listener="#{plantillaCorreoController.cargarPlantillaCorreoSeleccionado()}"
                                    process="@this" update="frmPlantillaCorreo"/>
                        </p:selectOneMenu>
                    </div>
                </div>
            </div>

            <!-- FORMULARIO DE EDICION (solo cuando hay plantilla seleccionada) -->
            <ui:fragment rendered="#{plantillaCorreoController.plantillaCorreoSeleccionado.id ne null}">
                <div class="surface-card shadow-1 border-round-lg p-3">
                    <p:outputPanel id="pnlPlantilla" class="ui-fluid">

                        <div class="formgrid grid">

                            <div class="field col-12">
                                <label for="asunto" class="font-medium text-700 text-sm">
                                    Asunto <span class="text-red-500">*</span>
                                </label>
                                <p:inputText id="asunto" styleClass="w-full"
                                             value="#{plantillaCorreoController.plantillaCorreoSeleccionado.asunto}"
                                             required="true"
                                             onkeyup="this.value = this.value.toUpperCase()"/>
                            </div>

                            <div class="field col-12">
                                <label for="editor" class="font-medium text-700 text-sm">Mensaje</label>
                                <p:textEditor id="editor" widgetVar="editor" height="300"
                                              style="width:100%"
                                              value="#{plantillaCorreoController.plantillaCorreoSeleccionado.mensaje}"/>
                            </div>

                        </div>

                        <div class="flex justify-content-end flex-wrap gap-2 mt-3">
                            <p:commandButton value="Cancelar" icon="pi pi-times"
                                             styleClass="ui-button-outlined ui-button-secondary"
                                             type="button"
                                             onclick="document.getElementById('frmPlantillaCorreo:plantilla').value = ''; PF('editor').setHTML('')"/>
                            <p:commandButton value="#{msg['btn.save']}" icon="pi pi-check"
                                             styleClass="ui-button-success"
                                             actionListener="#{plantillaCorreoController.actualizarRegistro}"
                                             update="pnlPlantilla msgs"
                                             process="pnlPlantilla @this"
                                             oncomplete="if (!args.validationFailed) PrimeFaces.info('Plantilla actualizada correctamente')"/>
                        </div>

                    </p:outputPanel>
                </div>
            </ui:fragment>

        </h:form>

    </ui:define>
</ui:composition>
