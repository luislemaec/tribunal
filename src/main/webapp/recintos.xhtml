<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/WEB-INF/template.xhtml">

    <ui:define name="title">#{msg['form.recintos.title']}</ui:define>

    <ui:define name="viewname">
        <li>#{msg['form.recintos.crumb.admin']}</li>
        <li>/</li>
        <li>
            <p:link outcome="/recintos">#{msg['form.recintos.title']}</p:link>
        </li>
    </ui:define>

    <ui:define name="content">

        <!-- ENCABEZADO -->
        <div class="grid mb-2">
            <div class="col-12">
                <div class="flex align-items-center gap-3">
                    <div class="flex justify-content-center align-items-center border-round-lg"
                         style="width:3.5rem;height:3.5rem;background:linear-gradient(135deg,#0ea5e9,#38bdf8);flex-shrink:0">
                        <i class="pi pi-map-marker text-white" style="font-size:1.5rem"></i>
                    </div>
                    <div>
                        <h2 class="m-0 text-900 font-bold text-2xl">#{msg['form.recintos.title']}</h2>
                        <p class="text-500 mt-1 mb-0 text-sm">#{msg['form.recintos.header']}</p>
                    </div>
                </div>
            </div>
        </div>

        <h:form id="frmRecintos">

            <!-- FILTROS GEOGRAFICOS -->
            <div class="surface-card shadow-1 border-round-lg p-3 mb-3">
                <div class="flex align-items-center gap-2 mb-3">
                    <i class="pi pi-filter text-500"></i>
                    <span class="font-semibold text-700">Filtros geográficos</span>
                </div>
                <div class="formgrid grid">
                    <div class="field col-12 md:col-6 lg:col-3">
                        <label for="canton" class="font-medium text-700 text-sm">#{msg['form.recintos.label.canton']}</label>
                        <p:selectOneMenu id="canton" value="#{recintoController.cantonSeleccionado.id}"
                                         filter="true" filterMatchMode="startsWith" styleClass="w-full">
                            <f:selectItem itemLabel="#{msg['form.recintos.placeholder.select']}" itemValue=""/>
                            <f:selectItems value="#{recintoController.cantones}" var="canton"
                                           itemLabel="#{canton.name}" itemValue="#{canton.id}"/>
                            <p:ajax event="change" listener="#{recintoController.obtieneParroquias()}"
                                    process="@this" update="frmRecintos"/>
                        </p:selectOneMenu>
                    </div>
                    <div class="field col-12 md:col-6 lg:col-3">
                        <label for="parroquia" class="font-medium text-700 text-sm">#{msg['form.recintos.label.parroquia']}</label>
                        <p:selectOneMenu id="parroquia" value="#{recintoController.parroquiaSeleccionado.id}" styleClass="w-full">
                            <f:selectItem itemLabel="#{msg['form.recintos.placeholder.select']}" itemValue=""/>
                            <f:selectItems value="#{recintoController.parroquias}" var="parroquia"
                                           itemLabel="#{parroquia.name}" itemValue="#{parroquia.id}"/>
                            <p:ajax event="change" listener="#{recintoController.obtieneRecintosPorParroquia()}"
                                    process="@this" update="frmRecintos msgs"/>
                        </p:selectOneMenu>
                    </div>
                </div>
            </div>

            <div class="surface-card shadow-1 border-round-lg p-3">

                <p:messages id="msgs" showDetail="true" closable="true" styleClass="mb-3"/>

                <!-- TOOLBAR -->
                <div class="flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
                    <div class="flex align-items-center gap-2 flex-wrap">
                        <p:commandButton value="#{msg['form.recintos.btn.new']}" icon="pi pi-plus"
                                         styleClass="ui-button-success"
                                         actionListener="#{recintoController.nuevaRecinto}"
                                         update="outPnlRecintos" oncomplete="PF('dlgRecinto').show()">
                            <p:resetInput target="outPnlRecintos"/>
                        </p:commandButton>
                        <p:commandButton id="btnEliminaRegistros"
                                         value="#{recintoController.mensajeBotonEliminar}"
                                         icon="pi pi-trash"
                                         styleClass="ui-button-danger"
                                         actionListener="#{recintoController.eliminarRecintosSeleccionados}"
                                         disabled="#{!recintoController.existeRecintosSeleccionados()}"
                                         update="@this tblRecintos msgs">
                            <p:confirm header="#{msg['form.recintos.confirm.delete.header']}"
                                       message="#{msg['form.recintos.confirm.delete.multiple']}"
                                       icon="pi pi-exclamation-triangle"/>
                        </p:commandButton>
                    </div>
                    <div class="flex align-items-center gap-2 flex-wrap">
                        <p:fileUpload mode="simple" skinSimple="true"
                                      label="#{msg['form.recintos.btn.import']}"
                                      chooseIcon="pi pi-download"
                                      disabled="#{recintoController.recintoSeleccionado.id eq null}"/>
                        <p:commandButton value="#{msg['form.recintos.btn.export']}" icon="pi pi-upload"
                                         styleClass="ui-button-outlined ui-button-help" ajax="false"
                                         disabled="#{empty recintoController.listaRecintos}">
                            <p:dataExporter type="pdf" target="tblRecintos" fileName="Recintos"/>
                        </p:commandButton>
                    </div>
                </div>

                <!-- DATATABLE -->
                <p:dataTable id="tblRecintos" widgetVar="wdTablaRecintos" var="recinto"
                             value="#{recintoController.listaRecintos}" reflow="true"
                             selection="#{recintoController.listaRecintosSeleccionados}" rowKey="#{recinto.id}"
                             paginator="true" rows="10" rowSelectMode="add"
                             rowsPerPageTemplate="10,25,50"
                             paginatorPosition="bottom"
                             paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                             currentPageReportTemplate="Mostrando {startRecord}-{endRecord} de {totalRecords} recintos"
                             emptyMessage="Seleccione cantón y parroquia para ver los recintos."
                             showGridlines="true"
                             styleClass="ui-datatable-striped ui-datatable-sm">
                    <p:ajax event="rowSelect"           update=":frmRecintos:btnEliminaRegistros"/>
                    <p:ajax event="rowUnselect"         update=":frmRecintos:btnEliminaRegistros"/>
                    <p:ajax event="rowSelectCheckbox"   update=":frmRecintos:btnEliminaRegistros"/>
                    <p:ajax event="rowUnselectCheckbox" update=":frmRecintos:btnEliminaRegistros"/>
                    <p:ajax event="toggleSelect"        update=":frmRecintos:btnEliminaRegistros"/>

                    <p:column selectionMode="multiple" exportable="false" style="width:3rem"/>

                    <p:column headerText="#{msg['form.recintos.table.header.id']}"
                              sortBy="#{recinto.id}" filterBy="#{recinto.id}"
                              style="width:6rem">
                        <span class="text-sm text-500">#{recinto.id}</span>
                    </p:column>
                    <p:column headerText="#{msg['form.recintos.table.header.nombre']}"
                              sortBy="#{recinto.nombre}" filterBy="#{recinto.nombre}"
                              filterMatchMode="contains">
                        <span class="text-sm font-medium text-900">#{recinto.nombre}</span>
                    </p:column>
                    <p:column headerText="#{msg['form.recintos.table.header.canton']}"
                              sortBy="#{recinto.cantonNombre}" filterBy="#{recinto.cantonNombre}"
                              filterMatchMode="contains" style="min-width:9rem">
                        <span class="text-sm text-700">#{recinto.cantonNombre}</span>
                    </p:column>
                    <p:column headerText="#{msg['form.recintos.table.header.parroquia']}"
                              sortBy="#{recinto.ubicacionNombre}" filterBy="#{recinto.ubicacionNombre}"
                              filterMatchMode="contains" style="min-width:11rem">
                        <span class="text-sm text-700">#{recinto.ubicacionNombre}</span>
                    </p:column>
                    <p:column headerText="#{msg['form.recintos.table.header.estado']}"
                              sortBy="#{recinto.estadoTarea}" filterBy="#{recinto.estadoTarea}"
                              filterMatchMode="contains" styleClass="text-center" style="width:10rem">
                        <p:tag value="#{recinto.estadoTarea}"
                               severity="#{recinto.estadoTarea eq 'COMPLETADO' ? 'success'
                                         : recinto.estadoTarea eq 'INICIADA'   ? 'warning'
                                         : recinto.estadoTarea eq 'ABORTADO'   ? 'danger'
                                         : 'info'}"
                               icon="#{recinto.estadoTarea eq 'COMPLETADO' ? 'pi pi-check'
                                     : recinto.estadoTarea eq 'ABORTADO'   ? 'pi pi-times'
                                     : 'pi pi-clock'}"/>
                    </p:column>
                    <p:column headerText="Acciones" exportable="false"
                              styleClass="text-center" style="width:7rem">
                        <p:commandButton icon="pi pi-pencil"
                                         styleClass="ui-button-rounded ui-button-text ui-button-warning"
                                         title="#{msg['form.recintos.btn.edit.title']}"
                                         update=":frmRecintos:outPnlRecintos"
                                         oncomplete="PF('dlgRecinto').show()"
                                         process="@this"
                                         action="#{recintoController.cagraDatosRecintoSeleccionado}">
                            <f:setPropertyActionListener value="#{recinto}" target="#{recintoController.recintoSeleccionado}"/>
                            <p:resetInput target=":frmRecintos:outPnlRecintos"/>
                        </p:commandButton>
                        <p:commandButton icon="pi pi-trash"
                                         styleClass="ui-button-rounded ui-button-text ui-button-danger"
                                         title="#{msg['form.recintos.btn.delete.title']}"
                                         actionListener="#{recintoController.eliminarRecintoSeleccionado}"
                                         process="@this" update="tblRecintos msgs">
                            <f:setPropertyActionListener value="#{recinto}" target="#{recintoController.recintoSeleccionado}"/>
                            <p:confirm header="#{msg['form.recintos.confirm.delete.header']}"
                                       message="#{msg['form.recintos.confirm.delete.message']}"
                                       icon="pi pi-exclamation-triangle"/>
                        </p:commandButton>
                    </p:column>
                </p:dataTable>

                <!-- Confirm dialog global -->
                <p:confirmDialog global="true" showEffect="fade" hideEffect="fade"
                                 responsive="true" width="400" style="max-width:96vw">
                    <p:commandButton value="Sí, eliminar" icon="pi pi-check"
                                     styleClass="ui-button-danger" type="button"
                                     onclick="PF('dlgConfirm').accept()"/>
                    <p:commandButton value="Cancelar" icon="pi pi-times"
                                     styleClass="ui-button-secondary ml-2" type="button"
                                     onclick="PF('dlgConfirm').reject()"/>
                </p:confirmDialog>

            </div><!-- /surface-card -->

            <!-- ======================================================
                 DIALOGO: NUEVO / EDITAR RECINTO
                 ====================================================== -->
            <p:dialog header="#{msg['form.recintos.dialog.title']}"
                      showEffect="fade" hideEffect="fade"
                      modal="true" widgetVar="dlgRecinto"
                      responsive="true" width="520"
                      style="max-width:96vw"
                      contentStyle="overflow-y:auto;max-height:75vh"
                      closeOnEscape="true">

                <p:outputPanel id="outPnlRecintos" class="ui-fluid">
                    <p:outputPanel rendered="#{not empty recintoController.recintoSeleccionado}">

                        <div class="formgrid grid">

                            <div class="field col-12">
                                <label for="nombre" class="font-medium text-700 text-sm">
                                    #{msg['form.recintos.label.nombre']} <span class="text-red-500">*</span>
                                </label>
                                <p:inputText id="nombre"
                                             value="#{recintoController.recintoSeleccionado.nombre}"
                                             maxlength="100" required="true" styleClass="w-full"
                                             onkeyup="this.value = this.value.toUpperCase()"/>
                            </div>

                            <div class="field col-12">
                                <label for="cantonSel" class="font-medium text-700 text-sm">
                                    #{msg['form.recintos.label.canton']} <span class="text-red-500">*</span>
                                </label>
                                <p:selectOneMenu id="cantonSel"
                                                 value="#{recintoController.cantonSeleccionado.id}"
                                                 filter="true" filterMatchMode="startsWith"
                                                 required="true" styleClass="w-full">
                                    <f:selectItem itemLabel="#{msg['form.recintos.placeholder.select']}" itemValue=""/>
                                    <f:selectItems value="#{recintoController.cantones}" var="canton"
                                                   itemLabel="#{canton.name}" itemValue="#{canton.id}"/>
                                    <p:ajax event="change" listener="#{recintoController.obtieneParroquias()}"
                                            process="@this" update="parroquiaSel"/>
                                </p:selectOneMenu>
                            </div>

                            <div class="field col-12">
                                <label for="parroquiaSel" class="font-medium text-700 text-sm">
                                    #{msg['form.recintos.label.parroquia']} <span class="text-red-500">*</span>
                                </label>
                                <p:selectOneMenu id="parroquiaSel"
                                                 value="#{recintoController.recintoSeleccionado.ubicacionId}"
                                                 required="true" styleClass="w-full">
                                    <f:selectItem itemLabel="#{msg['form.recintos.placeholder.select']}" itemValue=""/>
                                    <f:selectItems value="#{recintoController.parroquias}" var="parroquia"
                                                   itemLabel="#{parroquia.name}" itemValue="#{parroquia.id}"/>
                                </p:selectOneMenu>
                            </div>

                        </div>

                    </p:outputPanel>
                </p:outputPanel>

                <f:facet name="footer">
                    <div class="flex justify-content-end flex-wrap gap-2 w-full">
                        <p:commandButton value="#{msg['btn.cancel']}" icon="pi pi-times"
                                         onclick="PF('dlgRecinto').hide()"
                                         styleClass="ui-button-outlined ui-button-secondary"
                                         type="button"/>
                        <p:commandButton value="#{msg['btn.save']}" icon="pi pi-check"
                                         styleClass="ui-button-success"
                                         actionListener="#{recintoController.guardarRecintoSeleccionado}"
                                         update="outPnlRecintos tblRecintos msgs"
                                         process="outPnlRecintos @this"
                                         oncomplete="if (!args.validationFailed) PF('dlgRecinto').hide()"/>
                    </div>
                </f:facet>

            </p:dialog>

        </h:form>

    </ui:define>
</ui:composition>
